name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: Tests / Unit / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # ratchet:shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: swoole
          tools: phpunit
          coverage: ${{ matrix.php == '8.3' && 'pcov' || 'none' }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-req=ext-opentelemetry

      - name: Run unit tests
        if: matrix.php != '8.3'
        run: phpunit --configuration phpunit.xml --testsuite unit

      - name: Run unit tests with coverage
        if: matrix.php == '8.3'
        run: phpunit --configuration phpunit.xml --testsuite unit --coverage-text --coverage-clover coverage.xml

      - name: Upload coverage artifact
        if: matrix.php == '8.3' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: coverage-clover
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    name: Tests / E2E / ${{ matrix.adapter.display }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - {id: fpm, display: FPM}
          - {id: swoole, display: Swoole}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # ratchet:shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole
          tools: phpunit
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-req=ext-opentelemetry

      - name: Build and wait for ${{ matrix.adapter.id }} to be healthy
        run: docker compose up -d --build --wait ${{ matrix.adapter.id }}

      - name: Run E2E tests
        run: phpunit --configuration phpunit.xml --testsuite e2e-${{ matrix.adapter.id }}

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs ${{ matrix.adapter.id }}

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Build and wait for swoole to be healthy
        run: docker compose up -d --build --wait swoole

      - name: Setup k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # ratchet:grafana/setup-k6-action@v1

      - name: Run k6 benchmark
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # ratchet:grafana/run-k6-action@v1
        with:
          path: tests/bench/benchmark.js
          flags: --summary-export=summary.json
        env:
          BASE_URL: http://localhost:19501

      - name: Render PR comment body
        if: always() && hashFiles('summary.json') != ''
        run: |
          jq -r '
            .metrics as $m |
            [
              "### k6 benchmark",
              "",
              "| Throughput | Requests | Fail rate | p50 | p95 |",
              "| --- | --- | --- | --- | --- |",
              "| \(($m.http_reqs.rate // 0) | floor) req/s | \($m.http_reqs.count // 0) | \((($m.http_req_failed.value // 0) * 100) * 1000 | floor / 1000)% | \(($m.http_req_duration.med // 0) * 100 | floor / 100) ms | \(($m.http_req_duration["p(95)"] // 0) * 100 | floor / 100) ms |"
            ] | .[]
          ' summary.json > summary.md

      - name: Upload raw k6 summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: k6-summary
          path: summary.json
          if-no-files-found: ignore

      - name: Comment benchmark summary on PR
        if: github.event_name == 'pull_request' && always() && hashFiles('summary.md') != ''
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # ratchet:marocchino/sticky-pull-request-comment@v3
        with:
          header: k6-benchmark
          path: summary.md

      - name: Dump swoole logs on failure
        if: failure()
        run: docker compose logs swoole
