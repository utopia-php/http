name: CI

on:
  pull_request:
  push:
    branches: [master, "*.x"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pint
        run: |
          docker run --rm -v "$PWD":/app -w /app composer:2.7 sh -c \
            "composer install --profile --ignore-platform-reqs --no-interaction && composer lint"

  static:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: swoole
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPStan
        run: composer check

  tests:
    name: Tests (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [fpm, swoole]
    steps:
      - uses: actions/checkout@v4

      - name: Build and wait for ${{ matrix.adapter }} to be healthy
        run: docker compose up -d --build --wait ${{ matrix.adapter }}

      - name: Run tests
        run: docker compose exec -T ${{ matrix.adapter }} vendor/bin/phpunit --configuration phpunit.xml

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs ${{ matrix.adapter }}

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run phpbench
        run: |
          docker run --rm -v "$PWD":/app -w /app composer:2.7 sh -c \
            "composer install --profile --ignore-platform-reqs --no-interaction && git config --global --add safe.directory /app && composer bench -- --progress=plain"
